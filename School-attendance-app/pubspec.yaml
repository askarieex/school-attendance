name: school_attendance
description: A school attendance management app for parents and teachers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # ✅ PERFORMANCE: Removed google_fonts (saves 200ms load time + 500KB)
  provider: ^6.1.1
  intl: ^0.18.1
  table_calendar: ^3.0.9
  http: ^1.1.0
  shared_preferences: ^2.2.2
  # ✅ Restored for Student Profile Screen
  fl_chart: ^0.66.0
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  # ✅ SECURITY: Secure token storage
  flutter_secure_storage: ^9.0.0
  # ✅ SECURITY: JWT token validation
  jwt_decoder: ^2.0.1
  # ✅ PERFORMANCE: Network connectivity check
  connectivity_plus: ^5.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"

